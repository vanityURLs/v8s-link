<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>404 - Link not found | vanityURLs</title>
    <meta name="description" content="The requested short link was not found" />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/status.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="status-home" aria-labelledby="status-title">
        <a class="wordmark" href="/" aria-label="VanityURLs">
          <h1><span>Vanity</span><span>URLs</span></h1>
        </a>

        <p class="status-code" aria-hidden="true">404</p>

        <div class="message-box message-box--plain">
          <div class="message-copy">
            <h2 id="status-title">This short link does not exist</h2>
            <p>The URL may be mistyped, unpublished, removed, or intentionally unavailable</p>
          </div>
        </div>

        <!-- {{SLUG_MESSAGE}} -->
        <!-- {{REFERENCE_LINE}} -->

        <a
          class="redirected-badge"
          href="https://vanityURLs.link"
          target="_blank"
          rel="noreferrer"
          aria-label="VanityURLs"
        >
          <picture>
            <source srcset="/v8s-redirected-dark.svg" media="(prefers-color-scheme: dark)" />
            <img src="/v8s-redirected.svg" alt="V8S redirected by VanityURLs" />
          </picture>
        </a>

        <nav class="page-links" aria-label="Instance pages">
          <a href="/privacy">Privacy</a>
          <a href="/terms">Terms</a>
          <a href="/trust-safety">Trust &amp; Safety</a>
          <a href="/security">Security</a>
