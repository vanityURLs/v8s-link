<!doctype html>
<html lang="fr-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Consultation d'un lien court | VanityURLs</title>
    <meta name="description" content="Voir la destination d'un lien court VanityURLs avant de l'ouvrir" />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/style.css?v=20260601" />
    <link rel="stylesheet" href="/lookup.css?v=20260601" />
  </head>
  <body>
    <main class="page-shell">
      <section class="search-home" aria-labelledby="brand-title">
        <a class="wordmark" href="/" aria-label="VanityURLs">
          <h1 id="brand-title"><span>Vanity</span><span>URLs</span></h1>
        </a>

        <form class="redirect-form" id="lookupForm">
          <label class="sr-only" for="lookupKey">Lien court</label>
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="m21 21-4.35-4.35m1.1-5.15a6.25 6.25 0 1 1-12.5 0 6.25 6.25 0 0 1 12.5 0Z" />
            </svg>
            <input
              id="lookupKey"
              type="text"
              maxlength="99"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              inputmode="url"
              placeholder="Saisir un lien court pour voir sa destination"
              required
            />
            <button type="submit" aria-label="Voir la destination">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M5 12h12M13 6l6 6-6 6" />
              </svg>
            </button>
          </div>
        </form>

        <div class="lookup-result" id="lookupResult" aria-live="polite"></div>

        <a
          class="redirected-badge"
          href="https://vanityURLs.link"
          target="_blank"
          rel="noreferrer"
          aria-label="VanityURLs"
        >
          <picture>
            <source srcset="/fr/v8s-redirected-dark.svg" media="(prefers-color-scheme: dark)" />
            <img src="/fr/v8s-redirected.svg" alt="V8S redirigé par VanityURLs" />
          </picture>
        </a>

        <nav class="page-links" aria-label="Pages de l'instance">
          <a href="/fr/privacy.html">Confidentialité</a>
          <a href="/fr/terms.html">Conditions</a>
          <a href="/fr/abuse.html">Confiance et sécurité</a>
          <a href="/fr/security.html">Sécurité</a>
        </nav>
      </section>
    </main>
    <script src="/lookup.js?v=20260601" defer></script>
  </body>
</html>
